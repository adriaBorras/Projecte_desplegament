version: "3.9"
services:
  db:
    image: mysql:8
    container_name: blog-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: blog
      MYSQL_USER: bloguser
      MYSQL_PASSWORD: blogpass
    ports:
      - "3307:3306"   # host port 3307 -> container 3306
    volumes:
      - db_data:/var/lib/mysql
      - ./db-init:/docker-entrypoint-initdb.d

  api:
    build: ./api
    container_name: blog-api
    restart: always
    ports:
      - "8800:8800"
    env_file:
      - ./.env
    depends_on:
      - db

  front:
    build: ./front
    container_name: blog-front
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  db_data:
